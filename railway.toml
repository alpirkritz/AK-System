# Railway: build from repo root so pnpm-lock.yaml (next@14.2.35) is used.
# In Dashboard: leave Root Directory EMPTY so this file and the lockfile are in context.

[build]
buildCommand = "pnpm install --frozen-lockfile && pnpm run build"

[deploy]
# Use pnpm --filter so no shell (cd) is needed; Railway may run start without /bin/sh
startCommand = "pnpm --filter @ak-system/web start"
